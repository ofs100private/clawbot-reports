<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OfsInvest Dashboards</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            text-align: center;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            font-size: 1.2em;
            color: #888;
            margin-bottom: 50px;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }
        .dashboard-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .dashboard-card:hover {
            transform: translateY(-10px);
            background: rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        .dashboard-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }
        .dashboard-title {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .dashboard-desc {
            color: #888;
            font-size: 0.95em;
            line-height: 1.5;
        }
        .dashboard-value {
            font-size: 2em;
            font-weight: bold;
            margin-top: 15px;
            color: #4caf50;
        }
        .bot-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            display: inline-block;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 OfsInvest Dashboards</h1>
        <p class="subtitle">Choose your view</p>
        
        <div class="dashboard-grid">
            <a href="real-money-trading.html" class="dashboard-card">
                <div class="dashboard-icon">🤖</div>
                <div class="dashboard-title">Bot Trading</div>
                <div class="dashboard-desc">
                    OfsInvest automated trading system<br>
                    Expert 11-signal fusion strategy
                </div>
                <div class="bot-badge">$1,700 Budget</div>
                <div class="dashboard-value">+$7.23</div>
            </a>
            
            <a href="full-portfolio.html" class="dashboard-card">
                <div class="dashboard-icon">💼</div>
                <div class="dashboard-title">Full Portfolio</div>
                <div class="dashboard-desc">
                    Complete eToro portfolio view<br>
                    All manual + bot positions
                </div>
                <div class="bot-badge">$22,818 Total</div>
                <div class="dashboard-value">+$1,143</div>
            </a>
        </div>
        
        <div style="margin-top: 50px; color: #666; font-size: 0.9em;">
            <a href="historical-trades.html" style="color: #667eea; text-decoration: none;">📊 Historical Trades</a> • 
            <a href="brainmap.html" style="color: #667eea; text-decoration: none;">🧠 Brain Map</a>
        </div>
    </div>
</body>
</html>
