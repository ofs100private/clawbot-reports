<!DOCTYPE html>
<html>
<head><title>LinkedIn OAuth Callback</title>
<style>
body { font-family: -apple-system, sans-serif; background: #0d1117; color: #c9d1d9; display: flex; justify-content: center; align-items: center; height: 100vh; }
.card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 40px; text-align: center; max-width: 500px; }
h1 { color: #58a6ff; }
code { background: #1c2333; padding: 8px 16px; border-radius: 6px; display: block; margin: 16px 0; word-break: break-all; font-size: 1.1em; color: #2dd4bf; }
</style>
</head>
<body>
<div class="card">
<h1>✅ Authorization Successful</h1>
<p>Copy this code and send it to Ben:</p>
<code id="code">Loading...</code>
<p style="color:#8b949e;font-size:0.9em;">You can close this page after copying.</p>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
const error = params.get('error');
document.getElementById('code').textContent = error ? 'Error: ' + error : (code || 'No code found');
</script>
</body>
</html>
