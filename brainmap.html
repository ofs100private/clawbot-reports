<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ben's Brain Map - Interactive Skills & Infrastructure</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            overflow: hidden;
            color: white;
        }
        
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        #graph {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 2;
        }
        
        .node {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .node:hover {
            filter: brightness(1.5);
        }
        
        .node-circle {
            stroke-width: 2px;
            filter: drop-shadow(0 0 8px currentColor);
        }
        
        .node-text {
            font-size: 12px;
            fill: white;
            text-anchor: middle;
            pointer-events: none;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
        
        .node-icon {
            font-size: 24px;
            text-anchor: middle;
            dominant-baseline: central;
            pointer-events: none;
        }
        
        .link {
            stroke-opacity: 0.6;
            stroke-width: 1.5px;
            fill: none;
        }
        
        .link-main {
            stroke: #00ffff;
            stroke-width: 2px;
            filter: drop-shadow(0 0 3px #00ffff);
        }
        
        .link-sub {
            stroke: #4dd0e1;
            stroke-width: 1px;
            stroke-opacity: 0.4;
        }
        
        .tooltip {
            position: fixed;
            background: rgba(10, 14, 39, 0.95);
            border: 1px solid #00ffff;
            border-radius: 8px;
            padding: 12px;
            pointer-events: none;
            z-index: 1000;
            font-size: 13px;
            line-height: 1.6;
            max-width: 300px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .tooltip.visible {
            opacity: 1;
        }
        
        .tooltip-title {
            font-size: 16px;
            font-weight: bold;
            color: #00ffff;
            margin-bottom: 8px;
        }
        
        .tooltip-detail {
            color: #b0bec5;
            margin: 4px 0;
        }
        
        .zoom-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .zoom-btn {
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #00ffff;
            color: #00ffff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .zoom-btn:hover {
            background: rgba(0, 255, 255, 0.4);
            transform: scale(1.1);
        }
        
        .legend {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(10, 14, 39, 0.8);
            border: 1px solid #00ffff;
            border-radius: 8px;
            padding: 15px;
            z-index: 100;
            font-size: 12px;
        }
        
        .legend-title {
            font-size: 16px;
            font-weight: bold;
            color: #00ffff;
            margin-bottom: 10px;
        }
        
        .legend-item {
            margin: 5px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid currentColor;
        }
    </style>
</head>

        const stars = [];

        for (let i = 0; i < starCount; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 1.5,
                speed: Math.random() * 0.3 + 0.1,
                opacity: Math.random()
            });
        }
        
        function animateStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0a0e27';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
                ctx.fill();
                
                star.opacity += star.speed * 0.01;
                if (star.opacity > 1 || star.opacity < 0.2) {
                    star.speed = -star.speed;
                }
            });
            
            requestAnimationFrame(animateStars);
        }
        
        animateStars();
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

            { id: 'agents', label: 'Agents', icon: '🤖', type: 'infra', size: 40, color: '#ff9800', tooltip: 'AI Agents\n• Ben: Opus 4.6, 432 files, main assistant\n• OfsInvest: Grok 4, 88 files, 18,766 lines, 9.3/10 score\n• Architect: Grok 4, V2 research\n• Budget: Sonnet 4.5, family budget' },

            { id: 'apps', label: 'Apps', icon: '🔌', type: 'infra', size: 40, color: '#4caf50', tooltip: 'Connected Apps\neToro (53 endpoints)\nQuantClaw (699 modules)\nLinkedIn\nGmail\nGitHub' }

        // Add sub-nodes (initially hidden)
        const subNodes = [
            // Security Gate subs
            { id: 'sec-1', label: 'Prompt Injection', parent: 'security', type: 'sub', size: 8, color: '#ff8a80', visible: false },
            { id: 'sec-2', label: 'Code Scanning', parent: 'security', type: 'sub', size: 8, color: '#ff8a80', visible: false },

            { id: 'tech-6', label: 'Fibonacci', parent: 'technical', type: 'sub', size: 8, color: '#80deea', visible: false },
            
            // Buy/Sell Signal subs

            { id: 'bs-4', label: 'Stop Loss', parent: 'buysell', type: 'sub', size: 8, color: '#81d4fa', visible: false },
            
            // Market News subs
            { id: 'news-1', label: 'Multi-Source', parent: 'news', type: 'sub', size: 8, color: '#a5d6a7', visible: false },
            { id: 'news-2', label: 'News NLP', parent: 'news', type: 'sub', size: 8, color: '#a5d6a7', visible: false },
            { id: 'news-3', label: 'Crypto Fear & Greed', parent: 'news', type: 'sub', size: 8, color: '#a5d6a7', visible: false },
            
            // Analyst Targets subs
            { id: 'analyst-1', label: 'TipRanks', parent: 'analyst', type: 'sub', size: 8, color: '#fff59d', visible: false },
            { id: 'analyst-2', label: 'Consensus Rating', parent: 'analyst', type: 'sub', size: 8, color: '#fff59d', visible: false },
            { id: 'analyst-3', label: 'Upside Calc', parent: 'analyst', type: 'sub', size: 8, color: '#fff59d', visible: false },
            { id: 'analyst-4', label: 'Price Targets', parent: 'analyst', type: 'sub', size: 8, color: '#fff59d', visible: false },
            
            // Investing subs
            { id: 'inv-1', label: 'Micha Method', parent: 'investing', type: 'sub', size: 8, color: '#eceff1', visible: false },
            { id: 'inv-2', label: 'Risk Management', parent: 'investing', type: 'sub', size: 8, color: '#eceff1', visible: false },
            { id: 'inv-3', label: 'Portfolio Construction', parent: 'investing', type: 'sub', size: 8, color: '#eceff1', visible: false },
            { id: 'inv-4', label: '3-Tier Allocation', parent: 'investing', type: 'sub', size: 8, color: '#eceff1', visible: false },
            { id: 'inv-5', label: '10x DNA', parent: 'investing', type: 'sub', size: 8, color: '#eceff1', visible: false },
            
            // Chart Patterns subs
            { id: 'chart-1', label: 'Cup & Handle', parent: 'chartpatterns', type: 'sub', size: 8, color: '#90caf9', visible: false },
            { id: 'chart-2', label: 'H&S', parent: 'chartpatterns', type: 'sub', size: 8, color: '#90caf9', visible: false },
            { id: 'chart-3', label: 'Flags', parent: 'chartpatterns', type: 'sub', size: 8, color: '#90caf9', visible: false },

            { id: 'chart-6', label: 'Double Bottom', parent: 'chartpatterns', type: 'sub', size: 8, color: '#90caf9', visible: false },
            
            // QuantClaw subs
            { id: 'qc-1', label: '699 Modules', parent: 'quantclaw', type: 'sub', size: 8, color: '#b39ddb', visible: false },
            { id: 'qc-2', label: 'Fama-French', parent: 'quantclaw', type: 'sub', size: 8, color: '#b39ddb', visible: false },
            { id: 'qc-3', label: 'GEX', parent: 'quantclaw', type: 'sub', size: 8, color: '#b39ddb', visible: false },
            { id: 'qc-4', label: 'Smart Money', parent: 'quantclaw', type: 'sub', size: 8, color: '#b39ddb', visible: false },
            { id: 'qc-5', label: 'Screener', parent: 'quantclaw', type: 'sub', size: 8, color: '#b39ddb', visible: false },
            
            // eToro API subs
            { id: 'etoro-1', label: 'Portfolio', parent: 'etoro', type: 'sub', size: 8, color: '#f48fb1', visible: false },
            { id: 'etoro-2', label: 'Watchlists', parent: 'etoro', type: 'sub', size: 8, color: '#f48fb1', visible: false },
            { id: 'etoro-3', label: 'Trading', parent: 'etoro', type: 'sub', size: 8, color: '#f48fb1', visible: false },
            { id: 'etoro-4', label: 'Market Data', parent: 'etoro', type: 'sub', size: 8, color: '#f48fb1', visible: false },
            { id: 'etoro-5', label: 'WebSocket', parent: 'etoro', type: 'sub', size: 8, color: '#f48fb1', visible: false },
            
            // Social Media subs
            { id: 'social-1', label: 'LinkedIn', parent: 'social', type: 'sub', size: 8, color: '#ffe082', visible: false },
            { id: 'social-2', label: 'Content Strategy', parent: 'social', type: 'sub', size: 8, color: '#ffe082', visible: false },
            { id: 'social-3', label: 'Scheduling', parent: 'social', type: 'sub', size: 8, color: '#ffe082', visible: false },
            
            // Healthcare subs
            { id: 'health-1', label: 'GLP-1', parent: 'healthcare', type: 'sub', size: 8, color: '#ffab91', visible: false },
            { id: 'health-2', label: 'Immunotherapy', parent: 'healthcare', type: 'sub', size: 8, color: '#ffab91', visible: false },

            { id: 'sector-1', label: 'Nuclear/Space', parent: 'sectors', type: 'sub', size: 8, color: '#80cbc4', visible: false },
            { id: 'sector-2', label: 'BioPharma', parent: 'sectors', type: 'sub', size: 8, color: '#80cbc4', visible: false },
            { id: 'sector-3', label: 'Quantum', parent: 'sectors', type: 'sub', size: 8, color: '#80cbc4', visible: false },
            { id: 'sector-4', label: 'Crypto', parent: 'sectors', type: 'sub', size: 8, color: '#80cbc4', visible: false },
            { id: 'sector-5', label: 'Options', parent: 'sectors', type: 'sub', size: 8, color: '#80cbc4', visible: false },
            { id: 'sector-6', label: 'Under $1B', parent: 'sectors', type: 'sub', size: 8, color: '#80cbc4', visible: false },
            
            // Market Sentiment subs
            { id: 'sent-1', label: 'VIX', parent: 'sentiment', type: 'sub', size: 8, color: '#9575cd', visible: false },
            { id: 'sent-2', label: 'Put/Call', parent: 'sentiment', type: 'sub', size: 8, color: '#9575cd', visible: false },
            { id: 'sent-3', label: 'Fear & Greed', parent: 'sentiment', type: 'sub', size: 8, color: '#9575cd', visible: false },
            { id: 'sent-4', label: 'Capitulation', parent: 'sentiment', type: 'sub', size: 8, color: '#9575cd', visible: false },
            { id: 'sent-5', label: 'Sector Rotation', parent: 'sentiment', type: 'sub', size: 8, color: '#9575cd', visible: false }
        ];
        
        nodes.push(...subNodes);
        
        // Create links
        const links = [];
        
        // Connect skills to center
        nodes.filter(n => n.type === 'skill').forEach(node => {
            links.push({ source: 'center', target: node.id, type: 'main' });
        });
        
        // Connect sub-nodes to their parents
        subNodes.forEach(sub => {
            links.push({ source: sub.parent, target: sub.id, type: 'sub' });
        });
        
        // Create force simulation
        const simulation = d3.forceSimulation(nodes)
            .force('link', d3.forceLink(links).id(d => d.id).distance(d => d.type === 'sub' ? 60 : 150))
            .force('charge', d3.forceManyBody().strength(d => {
                if (d.type === 'center') return -800;
                if (d.type === 'infra') return -400;
                if (d.type === 'skill') return -300;
                return -50;
            }))
            .force('center', d3.forceCenter(width / 2, height / 2))
            .force('collision', d3.forceCollide().radius(d => d.size + 20))
            .alphaDecay(0.01);
        
        // Position infrastructure nodes around the edges
        nodes.filter(n => n.type === 'infra').forEach((node, i) => {
            const angle = (i / 6) * Math.PI * 2 - Math.PI / 2;
            const radius = Math.min(width, height) * 0.4;
            node.fx = width / 2 + Math.cos(angle) * radius;
            node.fy = height / 2 + Math.sin(angle) * radius;
        });
        
        // Draw links
        const link = g.append('g')
            .selectAll('line')
            .data(links)
            .enter().append('line')
            .attr('class', d => `link ${d.type === 'main' ? 'link-main' : 'link-sub'}`)
            .style('opacity', d => {
                if (d.type === 'sub') {
                    const target = nodes.find(n => n.id === d.target);
                    return target.visible ? 0.4 : 0;
                }
                return 0.6;
            });
        
        // Draw nodes
        const node = g.append('g')
            .selectAll('g')
            .data(nodes)
            .enter().append('g')
            .attr('class', 'node')
            .style('opacity', d => d.type === 'sub' && !d.visible ? 0 : 1)
            .call(d3.drag()
                .on('start', dragStarted)
                .on('drag', dragged)
                .on('end', dragEnded));
        
        // Node circles
        node.append('circle')
            .attr('class', 'node-circle')
            .attr('r', d => d.size)
            .attr('fill', d => d.color)
            .attr('stroke', d => d.color);
        
        // Node icons
        node.append('text')
            .attr('class', 'node-icon')
            .attr('dy', '0.35em')
            .style('font-size', d => d.type === 'center' ? '32px' : d.type === 'sub' ? '10px' : '20px')
            .text(d => d.icon || '');
        
        // Node labels
        node.append('text')
            .attr('class', 'node-text')
            .attr('dy', d => d.size + 15)
            .style('font-size', d => d.type === 'sub' ? '9px' : '12px')
            .text(d => d.label);
        
        // Tooltip
        const tooltip = d3.select('#tooltip');
        
        node.on('mouseover', function(event, d) {
            if (d.tooltip) {
                tooltip.select('.tooltip-title').text(d.label);
                tooltip.select('.tooltip-content').html(d.tooltip.replace(/\n/g, '<br>'));
                tooltip.classed('visible', true);
            }
        })
        .on('mousemove', function(event) {
            tooltip
                .style('left', (event.pageX + 15) + 'px')
                .style('top', (event.pageY + 15) + 'px');
        })
        .on('mouseout', function() {
            tooltip.classed('visible', false);
        });
        
        // Click to expand/collapse sub-nodes
        node.on('click', function(event, d) {
            if (d.type === 'skill') {
                const subs = nodes.filter(n => n.parent === d.id);
                const isExpanded = subs[0].visible;
                
                subs.forEach(sub => {
                    sub.visible = !isExpanded;
                });
                
                // Update visibility
                node.style('opacity', n => n.type === 'sub' && !n.visible ? 0 : 1)
                    .transition().duration(300);
                
                link.style('opacity', l => {
                    if (l.type === 'sub') {
                        const target = nodes.find(n => n.id === l.target);
                        return target.visible ? 0.4 : 0;
                    }
                    return 0.6;
                }).transition().duration(300);
                
                simulation.alpha(0.3).restart();
            }
        });
        
        // Tick function
        simulation.on('tick', () => {
            link
                .attr('x1', d => d.source.x)
                .attr('y1', d => d.source.y)
                .attr('x2', d => d.target.x)
                .attr('y2', d => d.target.y);
            
            node.attr('transform', d => `translate(${d.x},${d.y})`);
        });
        
        // Drag functions
        function dragStarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }
        
        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }
        
        function dragEnded(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            if (d.type !== 'infra') {
                d.fx = null;
                d.fy = null;
            }
        }
        
        // Zoom functionality
        const zoom = d3.zoom()
            .scaleExtent([0.3, 3])
            .on('zoom', (event) => {
                g.attr('transform', event.transform);
            });
        
        svg.call(zoom);
        
        function zoomIn() {
            svg.transition().call(zoom.scaleBy, 1.3);
        }
        
        function zoomOut() {
            svg.transition().call(zoom.scaleBy, 0.7);
        }
        
        function resetZoom() {
            svg.transition().call(zoom.transform, d3.zoomIdentity);
        }
        
        // Add gentle floating animation
        function addFloatingAnimation() {
            node.each(function(d, i) {
                if (d.type !== 'sub') {
                    d3.select(this)
                        .transition()
                        .duration(3000 + Math.random() * 2000)
                        .ease(d3.easeSinInOut)
                        .attr('transform', `translate(${d.x},${d.y + Math.sin(i) * 3})`)
                        .transition()
                        .duration(3000 + Math.random() * 2000)
                        .ease(d3.easeSinInOut)
                        .attr('transform', `translate(${d.x},${d.y - Math.sin(i) * 3})`)
                        .on('end', function repeat() {
                            d3.select(this)
                                .transition()
                                .duration(3000 + Math.random() * 2000)
                                .ease(d3.easeSinInOut)
                                .attr('transform', `translate(${d.x},${d.y + Math.sin(i) * 3})`)
                                .transition()
                                .duration(3000 + Math.random() * 2000)
                                .ease(d3.easeSinInOut)
                                .attr('transform', `translate(${d.x},${d.y - Math.sin(i) * 3})`)
                                .on('end', repeat);
                        });
                }
            });
        }
        
        // Start floating after initial layout
        setTimeout(addFloatingAnimation, 2000);
    </script>
</body>
</html>
