            margin-bottom: 15px;

            color: #667eea;

            transition: all 0.3s ease;
        }

            color: #fff;
            text-decoration: underline;
        }

        .breadcrumb-item.active {
            color: #fff;

        }

        .breadcrumb-separator {
            color: #666;

            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: bold;

            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .back-button:hover {

        }

        #brain-graph {
            width: 100%;
            height: 700px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            position: relative;
            overflow: hidden;
        }

        .node {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .node:hover .node-circle {
            filter: brightness(1.3) drop-shadow(0 0 15px currentColor);
            transform: scale(1.1);
            transform-origin: center;
        }

        .node-circle {
            transition: all 0.3s ease;
        }

        .connection-line {
            transition: all 0.5s ease;
        }

        .node-text {
            fill: #fff;
            font-size: 13px;
            text-anchor: middle;
            pointer-events: none;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        }

        .node-label {
            fill: #fff;
            font-size: 15px;
            font-weight: bold;
            text-anchor: middle;
            pointer-events: none;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.9);
        }

        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.95);
            color: #fff;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1000;
            max-width: 300px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .tooltip.visible {
            opacity: 1;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 12px;
            border-radius: 8px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid;
            transition: all 0.3s ease;
        }

            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);

            font-size: 0.9em;
            color: #999;
            margin-bottom: 8px;
        }

            font-size: 1.8em;
            font-weight: bold;

            padding-left: 0;

            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .fade-in {
            animation: fadeIn 0.5s ease;
        }

            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }

        // STATE MANAGEMENT
        let currentLevel = 0; // 0=root, 1=category, 2=item
        let currentCategory = null;
        let currentItem = null;

        // NAVIGATION
        function navigateToRoot() {
            currentLevel = 0;
            currentCategory = null;
            currentItem = null;
            render();
        }

        function navigateToCategory(categoryName) {
            currentLevel = 1;
            currentCategory = categoryName;
            currentItem = null;
            render();
        }

        function navigateToItem(categoryName, itemName) {
            currentLevel = 2;
            currentCategory = categoryName;
            currentItem = itemName;
            render();
        }

        function goBack() {
            if (currentLevel === 2) {
                navigateToCategory(currentCategory);
            } else if (currentLevel === 1) {
                navigateToRoot();
            }
        }

        // KEYBOARD SHORTCUTS
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                goBack();
            } else if (e.key === 'Home') {
                navigateToRoot();
            }
        });

        // RENDER FUNCTIONS
        function renderBreadcrumb() {
            const breadcrumb = document.getElementById('breadcrumb');
            let html = '<span class="breadcrumb-item" onclick="navigateToRoot()">Ben\'s Brain</span>';
            
            if (currentLevel >= 1) {
                html += '<span class="breadcrumb-separator">›</span>';
                html += `<span class="breadcrumb-item ${currentLevel === 1 ? 'active' : ''}" onclick="navigateToCategory('${currentCategory}')">${currentCategory}</span>`;
            }
            
            if (currentLevel === 2) {
                html += '<span class="breadcrumb-separator">›</span>';
                html += `<span class="breadcrumb-item active">${currentItem}</span>`;
            }
            
            breadcrumb.innerHTML = html;
        }

        function renderLegend() {
            const legend = document.getElementById('legend');
            if (currentLevel !== 0) {
                legend.style.display = 'none';
                return;
            }
            
            legend.style.display = 'flex';
            let html = '';
            for (const [name, data] of Object.entries(brainHierarchy)) {
                html += `
                    <div class="legend-item">
                        <div class="legend-color" style="background: ${data.color};"></div>
                        <span>${name} (${data.count})</span>
                    </div>
                `;
            }
            legend.innerHTML = html;
        }

        function renderRootLevel() {
            const container = document.getElementById('brain-graph');
            const width = container.clientWidth;
            const height = 700;
            const centerX = width / 2;
            const centerY = height / 2;
            const orbitRadius = Math.min(width, height) * 0.32;

            let svg = `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">`;

            // Connection lines
            const categories = Object.entries(brainHierarchy);
            categories.forEach(([name, data], i) => {
                const angle = (i / categories.length) * 2 * Math.PI - Math.PI / 2;
                const x = centerX + orbitRadius * Math.cos(angle);
                const y = centerY + orbitRadius * Math.sin(angle);
                svg += `<line class="connection-line" x1="${centerX}" y1="${centerY}" x2="${x}" y2="${y}" 
                            stroke="${data.color}" stroke-width="2" opacity="0.4"/>`;
            });

            // Category nodes
            categories.forEach(([name, data], i) => {
                const angle = (i / categories.length) * 2 * Math.PI - Math.PI / 2;
                const x = centerX + orbitRadius * Math.cos(angle);
                const y = centerY + orbitRadius * Math.sin(angle);
                const r = 60;

                svg += `
                    <g class="node" onclick="navigateToCategory('${name}')">
                        <circle class="node-circle" cx="${x}" cy="${y}" r="${r}" 
                                fill="${data.color}" opacity="0.85" stroke="${data.color}" stroke-width="3"
                                style="filter: drop-shadow(0 4px 12px ${data.color}80);"/>
                        <text class="node-label" x="${x}" y="${y - 8}">${name}</text>
                        <text class="node-text" x="${x}" y="${y + 12}">${data.count}</text>
                    </g>
                `;
            });

            // Center node
            svg += `
                <g class="node" onclick="navigateToRoot()">
                    <circle class="node-circle" cx="${centerX}" cy="${centerY}" r="90" 
                            fill="url(#centerGradient)" opacity="0.95" stroke="#667eea" stroke-width="4"
                            style="filter: drop-shadow(0 6px 20px rgba(102, 126, 234, 0.8));"/>
                    <defs>
                        <radialGradient id="centerGradient">
                            <stop offset="0%" stop-color="#667eea"/>
                            <stop offset="100%" stop-color="#764ba2"/>
                        </radialGradient>
                    </defs>
                    <text class="node-label" x="${centerX}" y="${centerY + 5}" font-size="20">Ben's Brain</text>
                </g>
            `;

            svg += '</svg>';
            container.innerHTML = svg;
        }

        function renderCategoryLevel() {
            const container = document.getElementById('brain-graph');
            const width = container.clientWidth;
            const height = 700;
            const centerX = width / 2;
            const centerY = height / 2;

            const categoryData = brainHierarchy[currentCategory];
            const items = Object.entries(categoryData.items);
            
            let svg = `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">`;

            // Calculate grid layout
            const cols = Math.ceil(Math.sqrt(items.length));
            const rows = Math.ceil(items.length / cols);
            const cellWidth = (width * 0.8) / cols;
            const cellHeight = (height * 0.8) / rows;
            const startX = (width - cellWidth * cols) / 2;
            const startY = (height - cellHeight * rows) / 2;

            // Item nodes
            items.forEach(([name, data], i) => {
                const col = i % cols;
                const row = Math.floor(i / cols);
                const x = startX + col * cellWidth + cellWidth / 2;
                const y = startY + row * cellHeight + cellHeight / 2;
                const r = 40;

                // Shorten long names
                let displayName = name;
                if (displayName.length > 18) {
                    displayName = displayName.substring(0, 15) + '...';
                }

                svg += `
                    <g class="node" onclick="navigateToItem('${currentCategory}', '${name}')">
                        <circle class="node-circle" cx="${x}" cy="${y}" r="${r}" 
                                fill="${categoryData.color}" opacity="0.8" stroke="${categoryData.color}" stroke-width="2"
                                style="filter: drop-shadow(0 3px 10px ${categoryData.color}60);"/>
                        <text class="node-text" x="${x}" y="${y + 5}">${displayName}</text>
                    </g>
                `;
            });

            svg += '</svg>';
            container.innerHTML = svg;
        }

        function renderItemLevel() {
            const container = document.getElementById('brain-graph');
            container.innerHTML = ''; // Clear graph for item detail view

            const detailsDiv = document.getElementById('item-details');
            const categoryData = brainHierarchy[currentCategory];
            const itemData = categoryData.items[currentItem];

            let html = '<div class="item-detail fade-in">';
            html += `<h3 style="color: ${categoryData.color};">${currentItem}</h3>`;
            
            if (itemData.description) {
                html += `<p style="margin-bottom: 15px; font-size: 1.1em;">${itemData.description}</p>`;
            }

            // Stats grid
            html += '<div class="stats-grid">';
            for (const [key, value] of Object.entries(itemData)) {
                if (key !== 'description' && key !== 'related') {
                    html += `
                        <div class="stat-card" style="border-color: ${categoryData.color};">
                            <h4>${key.replace(/_/g, ' ').toUpperCase()}</h4>
                            <div class="value" style="color: ${categoryData.color};">${value}</div>
                        </div>
                    `;
                }
            }
            html += '</div>';

            // Related items
            if (itemData.related && itemData.related.length > 0) {
                html += '<div style="margin-top: 20px;">';
                html += '<h4 style="color: #999; margin-bottom: 10px;">Related:</h4>';
                html += '<div style="display: flex; flex-wrap: wrap; gap: 10px;">';
                itemData.related.forEach(rel => {
                    html += `<span style="background: rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 6px; cursor: pointer; 
                                         border: 1px solid ${categoryData.color};" 
                                  onclick="navigateToItem('${currentCategory}', '${rel}')">${rel}</span>`;
                });
                html += '</div></div>';
            }

            html += '</div>';
            detailsDiv.innerHTML = html;
        }

        function render() {
            renderBreadcrumb();
            renderLegend();
            
            const detailsDiv = document.getElementById('item-details');
            
            if (currentLevel === 0) {
                renderRootLevel();
                detailsDiv.innerHTML = '';
            } else if (currentLevel === 1) {
                renderCategoryLevel();
                detailsDiv.innerHTML = '';
            } else if (currentLevel === 2) {
                renderItemLevel();
            }

            // Add fade-in animation
            const graph = document.getElementById('brain-graph');
            graph.classList.add('fade-in');
            setTimeout(() => graph.classList.remove('fade-in'), 500);
        }

        // Initialize on load
        window.addEventListener('load', render);
        window.addEventListener('resize', render);
    </script>
</body>
</html>
