<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ben's Brain Map</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e27;overflow:hidden;font-family:'Segoe UI',sans-serif;color:#fff}
canvas{position:fixed;top:0;left:0;z-index:0}
svg{position:fixed;top:0;left:0;z-index:1}
.legend{position:fixed;top:15px;left:15px;z-index:10;background:rgba(10,14,39,0.85);border:1px solid #00ffff44;border-radius:10px;padding:12px 16px;font-size:13px}
.legend h3{color:#00ffff;margin-bottom:6px;font-size:14px}
.legend-item{display:flex;align-items:center;gap:6px;margin:3px 0}
.legend-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.controls{position:fixed;bottom:20px;right:20px;z-index:10;display:flex;flex-direction:column;gap:6px}
.controls button{width:36px;height:36px;border-radius:50%;border:1px solid #00ffff;background:rgba(10,14,39,0.8);color:#00ffff;font-size:18px;cursor:pointer}
.controls button:hover{background:#00ffff33}
#tooltip{position:fixed;z-index:20;background:rgba(10,14,39,0.95);border:1px solid #00ffff88;border-radius:8px;padding:10px 14px;font-size:12px;pointer-events:none;display:none;max-width:250px;white-space:pre-line;line-height:1.5}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<svg id="graph"></svg>
<div class="legend">
  <h3>Ben's Brain Map</h3>
  <div class="legend-item"><span class="legend-dot" style="background:#00ffff"></span> Core Skills</div>
  <div class="legend-item"><span class="legend-dot" style="background:#ff6b6b"></span> Infrastructure</div>
  <div class="legend-item"><span class="legend-dot" style="background:#80cbc4"></span> Sub-skills</div>
  <div style="margin-top:6px;font-size:11px;opacity:0.6">🖱️ Drag nodes • Scroll to zoom</div>
</div>
<div class="controls">
  <button onclick="zoomBy(1.3)">+</button>
  <button onclick="zoomBy(0.7)">−</button>
  <button onclick="resetZoom()">↻</button>
</div>
<div id="tooltip"></div>

<script>
// Stars background
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
canvas.width = innerWidth;
canvas.height = innerHeight;
const stars = Array.from({length:200}, () => ({
  x: Math.random()*canvas.width, y: Math.random()*canvas.height,
  r: Math.random()*1.5+0.3, a: Math.random(), s: Math.random()*0.02+0.005
}));
function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{
    s.a += s.s; if(s.a>1||s.a<0.2) s.s=-s.s;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${s.a})`;ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();
addEventListener('resize',()=>{canvas.width=innerWidth;canvas.height=innerHeight});

// Data
const W = innerWidth, H = innerHeight, CX = W/2, CY = H/2;

const skills = [
  {id:'security',label:'Security Gate',icon:'🔒',color:'#ff6b6b',tip:'Prompt injection defense\nCode scanning\nCredential protection',
   subs:['Prompt Injection','Code Scanning','Credential Guard','Social Engineering']},
  {id:'technical',label:'Technical Analysis',icon:'📊',color:'#4dd0e1',tip:'MA150 system\n12 chart patterns\nATR sizing\nFibonacci zones',
   subs:['Chart Patterns','MA150 System','Darvas Box','ATR Sizing','Fibonacci','Elliott Wave']},
  {id:'signal',label:'Buy/Sell Signal',icon:'📈',color:'#66bb6a',tip:'Triple confirmation engine\nTechnical + Quant + Fundamental\nConfidence scoring',
   subs:['Triple Confirm','Entry Scanner','Stop Loss','Grok Model']},
  {id:'sentiment',label:'Market Sentiment',icon:'🧠',color:'#ab47bc',tip:'10-source composite score\nFear & Greed\nVIX\nPut/Call ratio',
   subs:['VIX','Fear & Greed','Put/Call','Capitulation','Sector Rotation','NVDA Barometer']},
  {id:'analyst',label:'Analyst Consensus',icon:'🎯',color:'#ffa726',tip:'Rating aggregation\nPrice targets\nSmart money overlay\nEarnings revisions',
   subs:['TipRanks','Consensus Rating','Upside Calc','Price Targets']},
  {id:'investing',label:'Investing',icon:'💰',color:'#ffee58',tip:'Master Micha methodology\nRisk management\n3-tier allocation\n10x DNA framework',
   subs:['Micha Method','Risk Mgmt','Portfolio','3-Tier Allocation','10x DNA','81 Stocks']},
  {id:'patterns',label:'Chart Patterns',icon:'📉',color:'#26c6da',tip:'12 patterns with rules\nEntry/Stop/Target\nVolume confirmation',
   subs:['Cup & Handle','H&S','Bull Flag','Triangles','Wedges','Double Bottom']},
  {id:'quantclaw',label:'QuantClaw',icon:'🌐',color:'#42a5f5',tip:'699 modules\n112 data sources\n$0/month\nBloomberg alternative',
   subs:['699 Modules','Fama-French','GEX','Smart Money','Screener','News']},
  {id:'etoro',label:'eToro API',icon:'💹',color:'#26a69a',tip:'53 endpoints\n15 positions live\n$36,379 invested\n+6.4% return',
   subs:['Portfolio','Watchlists','Trading','Market Data','WebSocket']},
  {id:'social',label:'Social Media',icon:'📱',color:'#ec407a',tip:'LinkedIn API\nContent strategy\nDraft + approval workflow',
   subs:['LinkedIn','Content Strategy','Scheduling']},
  {id:'healthcare',label:'Healthcare',icon:'🏥',color:'#ef5350',tip:'GLP-1/Obesity\nImmunotherapy\nGene therapy\nAI drug discovery',
   subs:['GLP-1','Immunotherapy','Gene Therapy','AI Discovery']},
  {id:'sectors',label:'Sectors',icon:'🔬',color:'#7e57c2',tip:'8 active sectors\nNuclear/Space\nBioPharma\nQuantum\nCrypto',
   subs:['Nuclear/Space','BioPharma','Quantum','Crypto','Options','Under $1B']},
  {id:'qmd',label:'Memory/QMD',icon:'💾',color:'#78909c',tip:'QMD working memory\nMemclawz hnswlib\nDaily memory files',
   subs:['QMD Zvec','Daily Notes','MEMORY.md']},
];

const infra = [
  {id:'gateway',label:'Gateway',icon:'🌐',color:'#42a5f5',tip:'OpenClaw v2026.2.24\nPort 41920\nWSL2'},
  {id:'channels',label:'Channels',icon:'💬',color:'#ab47bc',tip:'Telegram DM\nTelegram Group\n7 members'},
  {id:'agent',label:'Agent',icon:'🤖',color:'#ff7043',tip:'Ben (Opus)\nOfsInvest (Grok)\nArchitect (Grok)\nBudget (Sonnet)'},
  {id:'cron',label:'Cron Jobs',icon:'⏰',color:'#ef5350',tip:'9 active jobs\nGit push 6h\nDaily report 09:00\nNews briefing 04:20'},
  {id:'models',label:'Models',icon:'🧪',color:'#ffa726',tip:'Opus 4.6 (main)\nGrok 4 (free)\nSonnet 4.5 (sub-agents)'},
  {id:'apps',label:'Apps',icon:'🔌',color:'#66bb6a',tip:'eToro API\nQuantClaw\nLinkedIn\nGmail\nGitHub'},
];

// Build flat node list with positions
const nodes = [];
const links = [];

// Center
nodes.push({x:CX, y:CY, r:40, label:'My Skills', icon:'🧠', color:'#00ffff', tip:'Ben\'s Brain\n9 skills • 432 files\nOfsInvest 9.3/10\n13,716 lines knowledge', id:'center', type:'center'});

// Skills in a circle
const skillR = Math.min(W,H)*0.28;
skills.forEach((s,i) => {
  const a = (i/skills.length)*Math.PI*2 - Math.PI/2;
  const x = CX + Math.cos(a)*skillR;
  const y = CY + Math.sin(a)*skillR;
  nodes.push({x, y, r:22, label:s.label, icon:s.icon, color:s.color, tip:s.tip, id:s.id, type:'skill'});
  links.push({x1:CX, y1:CY, x2:x, y2:y, type:'main'});
  
  // Sub-nodes
  const subR = 55 + s.subs.length*3;
  s.subs.forEach((sub,j) => {
    const sa = (j/s.subs.length)*Math.PI*2 + a*0.3;
    const sx = x + Math.cos(sa)*subR;
    const sy = y + Math.sin(sa)*subR;
    nodes.push({x:sx, y:sy, r:6, label:sub, icon:'', color:s.color+'99', tip:sub, id:s.id+'-'+j, type:'sub'});
    links.push({x1:x, y1:y, x2:sx, y2:sy, type:'sub'});
  });
});

// Infrastructure around outer edge
const infraR = Math.min(W,H)*0.43;
infra.forEach((inf,i) => {
  const a = (i/infra.length)*Math.PI*2 + Math.PI/6;
  const x = CX + Math.cos(a)*infraR;
  const y = CY + Math.sin(a)*infraR;
  nodes.push({x, y, r:28, label:inf.label, icon:inf.icon, color:inf.color, tip:inf.tip, id:inf.id, type:'infra'});
});

// Render SVG
const svg = document.getElementById('graph');
svg.setAttribute('width', W);
svg.setAttribute('height', H);
const NS = 'http://www.w3.org/2000/svg';

// Defs for glow
const defs = document.createElementNS(NS,'defs');
const filter = document.createElementNS(NS,'filter');
filter.id = 'glow';
const blur = document.createElementNS(NS,'feGaussianBlur');
blur.setAttribute('stdDeviation','4');
blur.setAttribute('result','blur');
const merge = document.createElementNS(NS,'feMerge');
const m1 = document.createElementNS(NS,'feMergeNode');m1.setAttribute('in','blur');
const m2 = document.createElementNS(NS,'feMergeNode');m2.setAttribute('in','SourceGraphic');
merge.appendChild(m1);merge.appendChild(m2);
filter.appendChild(blur);filter.appendChild(merge);
defs.appendChild(filter);
svg.appendChild(defs);

const mainG = document.createElementNS(NS,'g');
mainG.id = 'main-group';
svg.appendChild(mainG);

// Draw links
links.forEach(l => {
  const line = document.createElementNS(NS,'line');
  line.setAttribute('x1',l.x1);line.setAttribute('y1',l.y1);
  line.setAttribute('x2',l.x2);line.setAttribute('y2',l.y2);
  line.setAttribute('stroke', l.type==='main'?'#00ffff44':'#ffffff22');
  line.setAttribute('stroke-width', l.type==='main'?'1.5':'0.8');
  line._data = l;
  mainG.appendChild(line);
});

// Draw nodes
const tooltip = document.getElementById('tooltip');
const nodeEls = [];

nodes.forEach(n => {
  const g = document.createElementNS(NS,'g');
  g.setAttribute('transform',`translate(${n.x},${n.y})`);
  g.style.cursor = 'pointer';
  
  // Outer glow circle
  if(n.type !== 'sub'){
    const glow = document.createElementNS(NS,'circle');
    glow.setAttribute('r', n.r+6);
    glow.setAttribute('fill', n.color+'22');
    glow.setAttribute('filter','url(#glow)');
    g.appendChild(glow);
  }
  
  // Main circle
  const c = document.createElementNS(NS,'circle');
  c.setAttribute('r', n.r);
  c.setAttribute('fill', n.type==='sub'? n.color : n.color+'33');
  c.setAttribute('stroke', n.color);
  c.setAttribute('stroke-width', n.type==='sub'?'1':'2');
  g.appendChild(c);
  
  // Icon
  if(n.icon){
    const t = document.createElementNS(NS,'text');
    t.setAttribute('text-anchor','middle');
    t.setAttribute('dominant-baseline','central');
    t.setAttribute('font-size', n.type==='center'?'28':n.type==='infra'?'20':'16');
    t.textContent = n.icon;
    g.appendChild(t);
  }
  
  // Label
  const label = document.createElementNS(NS,'text');
  label.setAttribute('text-anchor','middle');
  label.setAttribute('y', n.r + (n.type==='sub'?12:16));
  label.setAttribute('fill','#fff');
  label.setAttribute('font-size', n.type==='sub'?'9':'11');
  label.setAttribute('font-weight', n.type==='sub'?'normal':'bold');
  label.setAttribute('opacity', n.type==='sub'?'0.7':'0.9');
  label.textContent = n.label;
  g.appendChild(label);
  
  // Hover
  g.addEventListener('mouseenter', e => {
    tooltip.style.display = 'block';
    tooltip.textContent = (n.icon?n.icon+' ':'')+n.label+'\n'+n.tip;
    c.setAttribute('stroke-width', n.type==='sub'?'2':'3');
  });
  g.addEventListener('mousemove', e => {
    tooltip.style.left = (e.clientX+15)+'px';
    tooltip.style.top = (e.clientY+15)+'px';
  });
  g.addEventListener('mouseleave', () => {
    tooltip.style.display = 'none';
    c.setAttribute('stroke-width', n.type==='sub'?'1':'2');
  });
  
  // Drag
  let dragging = false, ox, oy;
  g.addEventListener('mousedown', e => {
    dragging = true;
    ox = e.clientX - n.x*currentZoom - panX;
    oy = e.clientY - n.y*currentZoom - panY;
    e.stopPropagation();
  });
  
  g._node = n;
  g._circle = c;
  nodeEls.push(g);
  mainG.appendChild(g);
});

// Drag handling
let currentZoom = 1, panX = 0, panY = 0;
let dragNode = null, dragEl = null;

document.addEventListener('mousemove', e => {
  if(dragNode){
    dragNode.x = (e.clientX - panX) / currentZoom - dragNode._ox;
    dragNode.y = (e.clientY - panY) / currentZoom - dragNode._oy;
    updatePositions();
  }
});

nodeEls.forEach(el => {
  el.addEventListener('mousedown', e => {
    dragNode = el._node;
    dragNode._ox = (e.clientX - panX)/currentZoom - dragNode.x;
    dragNode._oy = (e.clientY - panY)/currentZoom - dragNode.y;
    dragEl = el;
    e.preventDefault();
    e.stopPropagation();
  });
});

document.addEventListener('mouseup', () => { dragNode = null; dragEl = null; });

function updatePositions(){
  nodeEls.forEach(el => {
    const n = el._node;
    el.setAttribute('transform',`translate(${n.x},${n.y})`);
  });
  // Update links
  const lineEls = mainG.querySelectorAll('line');
  lineEls.forEach(line => {
    const d = line._data;
    if(d){
      // Find matching nodes
      const src = nodes.find(n => n.x===d.x1 && n.y===d.y1) || {x:d.x1,y:d.y1};
      line.setAttribute('x1',d.x1);line.setAttribute('y1',d.y1);
      line.setAttribute('x2',d.x2);line.setAttribute('y2',d.y2);
    }
  });
}

// Zoom
function applyTransform(){
  mainG.setAttribute('transform',`translate(${panX},${panY}) scale(${currentZoom})`);
}
svg.addEventListener('wheel', e => {
  e.preventDefault();
  const d = e.deltaY > 0 ? 0.9 : 1.1;
  currentZoom *= d;
  currentZoom = Math.max(0.2, Math.min(5, currentZoom));
  applyTransform();
});

// Pan
let panning = false, px, py;
svg.addEventListener('mousedown', e => {
  if(!dragNode){ panning=true; px=e.clientX-panX; py=e.clientY-panY; }
});
svg.addEventListener('mousemove', e => {
  if(panning && !dragNode){ panX=e.clientX-px; panY=e.clientY-py; applyTransform(); }
});
svg.addEventListener('mouseup', () => { panning=false; });

function zoomBy(f){ currentZoom*=f; currentZoom=Math.max(0.2,Math.min(5,currentZoom)); applyTransform(); }
function resetZoom(){ currentZoom=1; panX=0; panY=0; applyTransform(); }

// Gentle floating animation
let t = 0;
function float(){
  t += 0.01;
  nodeEls.forEach((el,i) => {
    const n = el._node;
    if(n.type==='center') return;
    const ox = Math.sin(t + i*0.7) * 0.5;
    const oy = Math.cos(t + i*0.5) * 0.5;
    el.setAttribute('transform',`translate(${n.x+ox},${n.y+oy})`);
  });
  requestAnimationFrame(float);
}
float();

console.log('Brain map loaded:', nodes.length, 'nodes,', links.length, 'links');
</script>
</body>
</html>
