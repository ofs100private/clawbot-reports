<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ben's Brain Map</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e27;font-family:'Segoe UI',Tahoma,sans-serif;color:#fff;overflow:hidden;width:100vw;height:100vh}
#world{position:absolute;top:0;left:0;width:100%;height:100%;transform-origin:0 0}
.node{position:absolute;text-align:center;cursor:pointer;transition:transform 0.2s;user-select:none}
.node:hover{transform:scale(1.15)!important;z-index:100}
.node-circle{border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto;border:2px solid;transition:all 0.2s}
.node:hover .node-circle{border-width:3px;box-shadow:0 0 20px currentColor}
.node-label{font-size:11px;font-weight:bold;margin-top:4px;white-space:nowrap;text-shadow:0 1px 4px rgba(0,0,0,0.8)}
.node-icon{font-size:22px;line-height:1}
.sub .node-circle{width:18px;height:18px;border-width:1px}
.sub .node-label{font-size:8px;font-weight:normal;opacity:0.6}
.sub .node-icon{font-size:8px}
.link{position:absolute;height:1px;transform-origin:0 0;pointer-events:none}
.legend{position:fixed;top:15px;left:15px;z-index:50;background:rgba(10,14,39,0.92);border:1px solid #00ffff55;border-radius:12px;padding:14px 18px;font-size:13px;backdrop-filter:blur(8px)}
.legend h3{color:#00ffff;margin-bottom:8px;font-size:15px}
.legend-item{display:flex;align-items:center;gap:8px;margin:4px 0}
.legend-dot{width:12px;height:12px;border-radius:50%;display:inline-block;border:1px solid rgba(255,255,255,0.2)}
.controls{position:fixed;bottom:20px;right:20px;z-index:50;display:flex;flex-direction:column;gap:8px}
.controls button{width:42px;height:42px;border-radius:50%;border:1.5px solid #00ffff;background:rgba(10,14,39,0.85);color:#00ffff;font-size:20px;cursor:pointer;transition:all 0.2s}
.controls button:hover{background:#00ffff33;transform:scale(1.1)}
.tooltip{position:fixed;z-index:100;background:rgba(10,14,39,0.96);border:1px solid #00ffff88;border-radius:8px;padding:12px 16px;font-size:12px;pointer-events:none;display:none;max-width:280px;line-height:1.7;backdrop-filter:blur(8px)}
.stats{position:fixed;bottom:20px;left:15px;z-index:50;font-size:11px;opacity:0.4}
canvas{position:fixed;top:0;left:0;z-index:0}
</style>
</head>
<body>
<canvas id="stars"></canvas>

<div class="legend">
  <h3>🧠 Ben's Brain Map</h3>
  <div class="legend-item"><span class="legend-dot" style="background:#00ffff"></span> Core Skills</div>
  <div class="legend-item"><span class="legend-dot" style="background:#ff6b6b"></span> Infrastructure</div>
  <div class="legend-item"><span class="legend-dot" style="background:rgba(255,255,255,0.35)"></span> Sub-skills</div>
  <div style="margin-top:8px;font-size:11px;opacity:0.45">🖱 Drag to pan • Scroll to zoom</div>
</div>

<div class="controls">
  <button onclick="zoom(1.3)">+</button>
  <button onclick="zoom(0.7)">−</button>
  <button onclick="resetView()">↻</button>
</div>

<div class="tooltip" id="tip"></div>
<div class="stats">Ben v9.3 · 102 files · 24,056 lines · Feb 27 2026 15:30 IST</div>

<div id="world"></div>

<script>
// Stars
const c=document.getElementById('stars'),x=c.getContext('2d');
function rs(){c.width=innerWidth;c.height=innerHeight}rs();addEventListener('resize',rs);
const S=Array.from({length:160},()=>({x:Math.random()*3000,y:Math.random()*2000,r:Math.random()*1.3+0.2,a:Math.random(),d:Math.random()*0.012+0.003}));
!function f(){x.clearRect(0,0,c.width,c.height);S.forEach(s=>{s.a+=s.d;if(s.a>1||s.a<0.1)s.d=-s.d;x.beginPath();x.arc(s.x%c.width,s.y%c.height,s.r,0,6.28);x.fillStyle=`rgba(255,255,255,${s.a})`;x.fill()});requestAnimationFrame(f)}();

// Layout
const W=innerWidth, H=innerHeight, CX=W/2, CY=H/2;

const skills=[
{id:'investing',label:'Investing',icon:'💰',color:'#ffee58',tip:'Master Micha methodology\nRisk management · 3-tier allocation\n10x DNA framework · 81-stock universe',subs:['Micha Method','Risk Mgmt','3-Tier','10x DNA','81 Stocks','Portfolio']},
{id:'technical',label:'Technical Analysis',icon:'📊',color:'#4dd0e1',tip:'MA150 system · 12 chart patterns\nATR sizing · Fibonacci · Darvas Box',subs:['MA150','Chart Patterns','Darvas Box','ATR Sizing','Fibonacci','Elliott Wave']},
{id:'quantclaw',label:'QuantClaw',icon:'🔬',color:'#42a5f5',tip:'699 modules · 112 data sources\nFama-French · GEX · Smart Money\n$0/month Bloomberg alternative',subs:['Fama-French','GEX','Smart Money','Screener','News','Pin Risk']},
{id:'signal',label:'Buy/Sell Signal',icon:'📈',color:'#66bb6a',tip:'Triple confirmation engine\nTechnical + Quant + Fundamental',subs:['Triple Confirm','Entry Scanner','Stop Loss','Grok']},
{id:'sentiment',label:'Market Sentiment',icon:'🧠',color:'#ab47bc',tip:'10-source composite · Fear & Greed\nVIX · Put/Call · Capitulation signals',subs:['VIX','Fear & Greed','Put/Call','Capitulation','Rotation','NVDA']},
{id:'etoro',label:'eToro API',icon:'💹',color:'#26a69a',tip:'53 endpoints · 15 positions live\n$36,379 invested · +6.4% return',subs:['Portfolio','Watchlists','Trading','Market Data','WebSocket']},
{id:'sectors',label:'8 Sectors',icon:'🔭',color:'#7e57c2',tip:'Nuclear/Space · BioPharma · Quantum\nCrypto · Options · Under $1B',subs:['Nuclear/Space','BioPharma','Quantum','Crypto','Options','Under $1B']},
{id:'security',label:'Security',icon:'🔒',color:'#ff6b6b',tip:'Prompt injection defense\nCode scanning · Credential guard',subs:['Prompt Inject','Code Scan','Credentials','Social Eng']},
{id:'social',label:'Social Media',icon:'📱',color:'#ec407a',tip:'LinkedIn API · Content strategy\nDraft + approval workflow',subs:['LinkedIn','Content','Scheduling']},
{id:'analyst',label:'Analyst Data',icon:'🎯',color:'#ffa726',tip:'Rating aggregation · Price targets\nSmart money · Earnings revisions',subs:['Consensus','Price Targets','Upside','Earnings']},
{id:'patterns',label:'Chart Patterns',icon:'📉',color:'#26c6da',tip:'12 patterns · Entry/Stop/Target\nVolume confirmation required',subs:['Cup&Handle','H&S','Bull Flag','Triangles','Wedges','Dbl Bottom']},
{id:'healthcare',label:'Healthcare',icon:'🏥',color:'#ef5350',tip:'GLP-1/Obesity · Immunotherapy\nGene therapy · AI drug discovery',subs:['GLP-1','Immuno','Gene Therapy','AI Disc']},
];

const infra=[
{id:'gateway',label:'Gateway',icon:'🌐',color:'#42a5f5',tip:'OpenClaw v2026.2.24\nPort 41920 · WSL2'},
{id:'channels',label:'Telegram',icon:'💬',color:'#ab47bc',tip:'DM + Group (7 members)\nGrok routed for groups'},
{id:'agents',label:'4 Agents',icon:'🤖',color:'#ff7043',tip:'Ben (Opus) · OfsInvest (Grok)\nArchitect (Grok) · Budget (Sonnet)'},
{id:'cron',label:'Cron',icon:'⏰',color:'#ef5350',tip:'9 jobs · Git push 6h\nDaily report · News briefing'},
{id:'models',label:'3 Models',icon:'🧪',color:'#ffa726',tip:'Opus 4.6 · Grok 4 (free)\nSonnet 4.5 (sub-agents)'},
{id:'apps',label:'Integrations',icon:'🔌',color:'#66bb6a',tip:'eToro · QuantClaw · LinkedIn\nGmail · GitHub · Memclawz'},
{id:'memory',label:'Memory',icon:'💾',color:'#78909c',tip:'QMD · Memclawz hnswlib\nDaily notes · MEMORY.md'},
{id:'github',label:'GitHub',icon:'📦',color:'#e0e0e0',tip:'clawbot_ofs100 (private)\nclawbot-reports (pages)'},
];

const world=document.getElementById('world');
const tip=document.getElementById('tip');
const allNodes=[];

function makeNode(px,py,size,icon,label,color,tipText,type,parentEl){
  const el=document.createElement('div');
  el.className='node'+(type==='sub'?' sub':'');
  el.style.left=(px-size/2)+'px';
  el.style.top=(py-size/2)+'px';
  el.style.width=size+'px';
  el.style.zIndex=type==='sub'?'1':type==='center'?'5':'3';
  
  const circle=document.createElement('div');
  circle.className='node-circle';
  circle.style.width=size+'px';
  circle.style.height=size+'px';
  circle.style.borderColor=color;
  circle.style.color=color;
  circle.style.background=color+(type==='sub'?'22':'1a');
  circle.style.boxShadow=type==='sub'?'none':`0 0 ${size/3}px ${color}44`;
  
  const ic=document.createElement('div');
  ic.className='node-icon';
  ic.style.fontSize=(type==='center'?size*0.45:type==='sub'?'7px':size*0.4)+'px';
  ic.textContent=icon;
  circle.appendChild(ic);
  el.appendChild(circle);
  
  const lbl=document.createElement('div');
  lbl.className='node-label';
  lbl.textContent=label;
  el.appendChild(lbl);
  
  el.addEventListener('mouseenter',e=>{
    tip.style.display='block';
    tip.innerHTML='<b>'+icon+' '+label+'</b><br>'+tipText.replace(/\n/g,'<br>');
  });
  el.addEventListener('mousemove',e=>{
    tip.style.left=(e.clientX+15)+'px';tip.style.top=(e.clientY+15)+'px';
  });
  el.addEventListener('mouseleave',()=>{tip.style.display='none'});
  
  (parentEl||world).appendChild(el);
  allNodes.push({el,x:px,y:py});
  return {el,x:px,y:py};
}

function drawLine(x1,y1,x2,y2,color,width){
  const dx=x2-x1,dy=y2-y1;
  const len=Math.sqrt(dx*dx+dy*dy);
  const ang=Math.atan2(dy,dx)*180/Math.PI;
  const line=document.createElement('div');
  line.className='link';
  line.style.left=x1+'px';line.style.top=y1+'px';
  line.style.width=len+'px';
  line.style.height=(width||1.5)+'px';
  line.style.background=color||'rgba(0,255,255,0.2)';
  line.style.transform=`rotate(${ang}deg)`;
  world.appendChild(line);
}

// Center
const centerSize=80;
makeNode(CX,CY,centerSize,'🧠','Ben\'s Brain','#00ffff','Score: 9.3/10\n102 files · 24,056 lines\n12 skills · 8 sectors · 4 agents','center');

// Skills ring
const skillR=Math.min(W,H)*0.27;
skills.forEach((s,i)=>{
  const a=(i/skills.length)*Math.PI*2 - Math.PI/2;
  const px=CX+Math.cos(a)*skillR;
  const py=CY+Math.sin(a)*skillR;
  makeNode(px,py,50,s.icon,s.label,s.color,s.tip,'skill');
  drawLine(CX,CY,px,py,s.color+'33',1.5);
  
  // Subs
  const subR=65+s.subs.length*6;
  s.subs.forEach((sub,j)=>{
    const sa=a+((j-(s.subs.length-1)/2)*0.3);
    const sx=px+Math.cos(sa)*subR;
    const sy=py+Math.sin(sa)*subR;
    makeNode(sx,sy,20,'·',sub,s.color,sub,'sub');
    drawLine(px,py,sx,sy,s.color+'18',0.7);
  });
});

// Infra ring
const infraR=Math.min(W,H)*0.44;
infra.forEach((inf,i)=>{
  const a=(i/infra.length)*Math.PI*2+Math.PI/8;
  const px=CX+Math.cos(a)*infraR;
  const py=CY+Math.sin(a)*infraR;
  makeNode(px,py,58,inf.icon,inf.label,inf.color,inf.tip,'infra');
});

// Pan & zoom
let scale=1, tx=0, ty=0;
function apply(){world.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`}
let panning=false,ps;
world.addEventListener('mousedown',e=>{panning=true;ps={x:e.clientX-tx,y:e.clientY-ty};e.preventDefault()});
addEventListener('mousemove',e=>{if(panning){tx=e.clientX-ps.x;ty=e.clientY-ps.y;apply()}});
addEventListener('mouseup',()=>{panning=false});
addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY>0?0.92:1.08;
  const rect=world.getBoundingClientRect();
  const ox=(e.clientX-rect.left)/scale;
  const oy=(e.clientY-rect.top)/scale;
  const ns=Math.max(0.3,Math.min(4,scale*f));
  tx+= ox*(scale-ns); ty+= oy*(scale-ns);
  scale=ns; apply();
},{passive:false});

function zoom(f){scale=Math.max(0.3,Math.min(4,scale*f));apply()}
function resetView(){scale=1;tx=0;ty=0;apply()}

console.log('Brain map v4: '+allNodes.length+' nodes rendered');
</script>
</body>
</html>
