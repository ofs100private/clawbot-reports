    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            overflow: hidden;
            color: white;
        }
        
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        #graph {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 2;
            cursor: grab;
        }
        
        #graph.dragging {
            cursor: grabbing;
        }
        
        .node {
            cursor: pointer;
            transition: filter 0.3s ease;
        }
        
        .node:hover {
            filter: brightness(1.5);
        }
        
        .node-circle {
            stroke-width: 2px;
            filter: drop-shadow(0 0 8px currentColor);
        }
        
        .node-text {
            font-size: 12px;
            fill: white;
            text-anchor: middle;
            pointer-events: none;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
        
        .node-icon {
            font-size: 24px;
            text-anchor: middle;
            dominant-baseline: central;
            pointer-events: none;
        }
        
        .link {
            stroke-opacity: 0.6;
            stroke-width: 1.5px;
            fill: none;
        }
        
        .link-main {
            stroke: #00ffff;
            stroke-width: 2px;
            filter: drop-shadow(0 0 3px #00ffff);
        }
        
        .link-sub {
            stroke: #4dd0e1;
            stroke-width: 1px;
            stroke-opacity: 0.4;
        }
        
        .tooltip {
            position: fixed;
            background: rgba(10, 14, 39, 0.95);
            border: 1px solid #00ffff;
            border-radius: 8px;
            padding: 12px;
            pointer-events: none;
            z-index: 1000;
            font-size: 13px;
            line-height: 1.6;
            max-width: 300px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .tooltip.visible {
            opacity: 1;
        }
        
        .tooltip-title {
            font-size: 16px;
            font-weight: bold;
            color: #00ffff;
            margin-bottom: 8px;
        }
        
        .tooltip-detail {
            color: #b0bec5;
            margin: 4px 0;
        }
        
        .zoom-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .zoom-btn {
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #00ffff;
            color: #00ffff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .zoom-btn:hover {
            background: rgba(0, 255, 255, 0.4);
            transform: scale(1.1);
        }
        
        .legend {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(10, 14, 39, 0.8);
            border: 1px solid #00ffff;
            border-radius: 8px;
            padding: 15px;
            z-index: 100;
            font-size: 12px;
        }
        
        .legend-title {
            font-size: 16px;
            font-weight: bold;
            color: #00ffff;
            margin-bottom: 10px;
        }
        
        .legend-item {
            margin: 5px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid currentColor;
        }
    </style>
</head>

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
                ctx.fill();
                
                star.opacity += star.speed * 0.01;
                if (star.opacity > 1 || star.opacity < 0.2) {
                    star.speed = -star.speed;
                }
            });
            
            requestAnimationFrame(animateStars);

        // Calculate fixed positions - radial layout
        function calculatePositions() {
            console.log('Calculating node positions...');
            
            // Center node
            const centerNode = nodes.find(n => n.type === 'center');
            centerNode.x = centerX;
            centerNode.y = centerY;
            console.log('Center node at:', centerNode.x, centerNode.y);
            
            // Skill nodes in a circle around center
            const skillNodes = nodes.filter(n => n.type === 'skill');
            const skillRadius = Math.min(width, height) * 0.25;
            skillNodes.forEach((node, i) => {
                const angle = (i / skillNodes.length) * Math.PI * 2 - Math.PI / 2;
                node.x = centerX + Math.cos(angle) * skillRadius;
                node.y = centerY + Math.sin(angle) * skillRadius;
            });
            console.log('Positioned', skillNodes.length, 'skill nodes at radius', skillRadius);
            
            // Infrastructure nodes around edges
            const infraNodes = nodes.filter(n => n.type === 'infra');
            const infraRadius = Math.min(width, height) * 0.4;
            infraNodes.forEach((node, i) => {
                const angle = (i / infraNodes.length) * Math.PI * 2 - Math.PI / 2;
                node.x = centerX + Math.cos(angle) * infraRadius;
                node.y = centerY + Math.sin(angle) * infraRadius;
            });
            console.log('Positioned', infraNodes.length, 'infra nodes at radius', infraRadius);
            
            // Sub-nodes around their parents
            const subNodes = nodes.filter(n => n.type === 'sub');
            const nodesByParent = {};
            subNodes.forEach(sub => {
                if (!nodesByParent[sub.parent]) {
                    nodesByParent[sub.parent] = [];
                }
                nodesByParent[sub.parent].push(sub);
            });
            
            Object.keys(nodesByParent).forEach(parentId => {
                const parent = nodes.find(n => n.id === parentId);
                const subs = nodesByParent[parentId];
                const subRadius = 60;
                
                subs.forEach((sub, i) => {
                    const angle = (i / subs.length) * Math.PI * 2;
                    sub.x = parent.x + Math.cos(angle) * subRadius;
                    sub.y = parent.y + Math.sin(angle) * subRadius;
                });
            });
            console.log('Positioned', subNodes.length, 'sub-nodes around their parents');
        }

            const sourceNode = getNode(link.source);
            const targetNode = getNode(link.target);
            
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('class', `link ${link.type === 'main' ? 'link-main' : 'link-sub'}`);
            line.setAttribute('x1', sourceNode.x);
            line.setAttribute('y1', sourceNode.y);
            line.setAttribute('x2', targetNode.x);
            line.setAttribute('y2', targetNode.y);
            linkGroup.appendChild(line);
            
            link.element = line;
        });
        console.log('Links drawn');

            nodeEl.setAttribute('class', 'node');
            nodeEl.setAttribute('transform', `translate(${node.x}, ${node.y})`);
            nodeEl.setAttribute('data-id', node.id);
            
            // Circle
            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('class', 'node-circle');
            circle.setAttribute('r', node.size);
            circle.setAttribute('fill', node.color);
            circle.setAttribute('stroke', node.color);
            nodeEl.appendChild(circle);
            
            // Icon
            if (node.icon) {
                const icon = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                icon.setAttribute('class', 'node-icon');
                icon.setAttribute('dy', '0.35em');
                icon.style.fontSize = node.type === 'center' ? '32px' : node.type === 'sub' ? '10px' : '20px';
                icon.textContent = node.icon;
                nodeEl.appendChild(icon);
            }
            
            // Label
            const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            label.setAttribute('class', 'node-text');
            label.setAttribute('dy', node.size + 15);
            label.style.fontSize = node.type === 'sub' ? '9px' : '12px';
            label.textContent = node.label;
            nodeEl.appendChild(label);
            
            nodeGroup.appendChild(nodeEl);
            node.element = nodeEl;
        });
        console.log('Nodes drawn');
        
        // Tooltip functionality
        const tooltip = document.getElementById('tooltip');
        const tooltipTitle = tooltip.querySelector('.tooltip-title');
        const tooltipContent = tooltip.querySelector('.tooltip-content');
        
        nodes.forEach(node => {
            if (node.tooltip) {
                node.element.addEventListener('mouseenter', (e) => {
                    tooltipTitle.textContent = node.label;
                    tooltipContent.innerHTML = node.tooltip.replace(/\n/g, '<br>');
                    tooltip.classList.add('visible');
                });
                
                node.element.addEventListener('mousemove', (e) => {
                    tooltip.style.left = (e.pageX + 15) + 'px';
                    tooltip.style.top = (e.pageY + 15) + 'px';
                });
                
                node.element.addEventListener('mouseleave', () => {
                    tooltip.classList.remove('visible');
                });
            }
        });
        
        // Drag nodes
        let draggedNode = null;
        let dragOffsetX = 0;
        let dragOffsetY = 0;
        
        nodes.forEach(node => {
            node.element.addEventListener('mousedown', (e) => {
                draggedNode = node;
                const transform = node.element.getAttribute('transform');
                const match = transform.match(/translate\(([\d.]+),\s*([\d.]+)\)/);
                if (match) {
                    dragOffsetX = e.clientX - parseFloat(match[1]);
                    dragOffsetY = e.clientY - parseFloat(match[2]);
                }
                e.preventDefault();
            });
        });
        
        document.addEventListener('mousemove', (e) => {
            if (draggedNode) {
                const newX = e.clientX - dragOffsetX;
                const newY = e.clientY - dragOffsetY;
                
                draggedNode.x = newX;
                draggedNode.y = newY;
                draggedNode.element.setAttribute('transform', `translate(${newX}, ${newY})`);
                
                // Update connected links
                links.forEach(link => {
                    if (link.source === draggedNode.id || link.target === draggedNode.id) {
                        const sourceNode = getNode(link.source);
                        const targetNode = getNode(link.target);
                        link.element.setAttribute('x1', sourceNode.x);
                        link.element.setAttribute('y1', sourceNode.y);
                        link.element.setAttribute('x2', targetNode.x);
                        link.element.setAttribute('y2', targetNode.y);
                    }
                });
            }
        });
        
        document.addEventListener('mouseup', () => {
            draggedNode = null;
        });
        
        // Pan and zoom
        let scale = 1;
        let translateX = 0;
        let translateY = 0;
        let isPanning = false;
        let panStartX = 0;
        let panStartY = 0;
        
        function updateTransform() {
            g.setAttribute('transform', `translate(${translateX}, ${translateY}) scale(${scale})`);
        }
        
        // Mouse wheel zoom
        svg.addEventListener('wheel', (e) => {
            e.preventDefault();
            
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            const newScale = Math.max(0.3, Math.min(3, scale * delta));
            
            // Zoom towards mouse position
            const rect = svg.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            translateX = mouseX - (mouseX - translateX) * (newScale / scale);
            translateY = mouseY - (mouseY - translateY) * (newScale / scale);
            scale = newScale;
            
            updateTransform();
            console.log('Zoom:', scale.toFixed(2));
        });
        
        // Pan with drag
        svg.addEventListener('mousedown', (e) => {
            if (e.target === svg || e.target === g) {
                isPanning = true;
                panStartX = e.clientX - translateX;
                panStartY = e.clientY - translateY;
                svg.classList.add('dragging');
            }
        });
        
        document.addEventListener('mousemove', (e) => {
            if (isPanning) {
                translateX = e.clientX - panStartX;
                translateY = e.clientY - panStartY;
                updateTransform();
            }
        });
        
        document.addEventListener('mouseup', () => {
            if (isPanning) {
                isPanning = false;
                svg.classList.remove('dragging');
            }
        });
        
        // Zoom buttons
        window.zoomIn = function() {
            scale = Math.min(3, scale * 1.3);
            updateTransform();
            console.log('Zoom in:', scale.toFixed(2));
        };
        
        window.zoomOut = function() {
            scale = Math.max(0.3, scale * 0.7);
            updateTransform();
            console.log('Zoom out:', scale.toFixed(2));
        };
        
        window.resetZoom = function() {
            scale = 1;
            translateX = 0;
            translateY = 0;
            updateTransform();
            console.log('Zoom reset');
        };
        
        // Recalculate positions on resize
        window.addEventListener('resize', () => {
            const newWidth = window.innerWidth;
            const newHeight = window.innerHeight;
            svg.setAttribute('width', newWidth);
            svg.setAttribute('height', newHeight);
            calculatePositions();
            
            // Update all elements
            nodes.forEach(node => {
                node.element.setAttribute('transform', `translate(${node.x}, ${node.y})`);
            });
            
            links.forEach(link => {
                const sourceNode = getNode(link.source);
                const targetNode = getNode(link.target);
                link.element.setAttribute('x1', sourceNode.x);
                link.element.setAttribute('y1', sourceNode.y);
                link.element.setAttribute('x2', targetNode.x);
                link.element.setAttribute('y2', targetNode.y);
            });
            
            console.log('Resized and repositioned');
        });
        
        console.log('Brain map fully initialized and ready!');
        console.log('All', nodes.length, 'nodes are visible');
        console.log('Use mouse wheel to zoom, drag to pan, drag nodes to reposition');
    </script>
</body>
</html>
